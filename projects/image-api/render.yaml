# Image Optimization API - Render Configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: image-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: MAX_FILE_SIZE_MB
        value: "20"
      - key: MAX_MEMORY_PER_REQUEST_MB
        value: "100"
      - key: REDIS_URL
        fromService:
          name: image-api-redis
          type: pserv
          property: connection

  - type: pserv
    name: image-api-redis
    runtime: docker
    dockerImage: redis:7-alpine
    plan: free
    numInstances: 1